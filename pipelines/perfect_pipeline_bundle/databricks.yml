# This is a Databricks asset bundle definition for perfect_pipeline_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: perfect_pipeline_bundle
  uuid: f18c99c3-29a9-4ccb-8bff-1780ca475744

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-10414eb9-6e91.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-10414eb9-6e91.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/bjturner@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Users/bjturner@outlook.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: bjturner@outlook.com
        level: CAN_MANAGE
